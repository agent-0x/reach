<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0E1116"/>

  <!-- Server rack (right side) -->
  <rect x="310" y="160" width="80" height="192" rx="8" fill="#2D2D2D" stroke="#00ADD8" stroke-width="3"/>
  <!-- Server slots -->
  <rect x="322" y="176" width="56" height="20" rx="3" fill="#1A1A2E"/>
  <circle cx="366" cy="186" r="4" fill="#00ADD8"/>
  <rect x="322" y="208" width="56" height="20" rx="3" fill="#1A1A2E"/>
  <circle cx="366" cy="218" r="4" fill="#00E676"/>
  <rect x="322" y="240" width="56" height="20" rx="3" fill="#1A1A2E"/>
  <circle cx="366" cy="250" r="4" fill="#00ADD8"/>
  <rect x="322" y="272" width="56" height="20" rx="3" fill="#1A1A2E"/>
  <circle cx="366" cy="282" r="4" fill="#00E676"/>
  <rect x="322" y="304" width="56" height="20" rx="3" fill="#1A1A2E"/>
  <circle cx="366" cy="314" r="4" fill="#00ADD8"/>

  <!-- Reaching arrow (left to right) -->
  <path d="M100 256 L270 256" stroke="#00ADD8" stroke-width="6" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M258 240 L282 256 L258 272" stroke="#00ADD8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Signal waves from arrow tip -->
  <path d="M286 232 Q302 256 286 280" stroke="#00ADD8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M296 220 Q318 256 296 292" stroke="#00ADD8" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Hand/origin circle (left) -->
  <circle cx="90" cy="256" r="22" fill="#00ADD8" opacity="0.15"/>
  <circle cx="90" cy="256" r="12" fill="#00ADD8"/>

  <!-- Terminal cursor blink in origin -->
  <rect x="84" y="250" width="12" height="2" fill="#0E1116"/>
  <rect x="84" y="254" width="8" height="2" fill="#0E1116"/>
  <rect x="84" y="258" width="10" height="2" fill="#0E1116"/>

  <!-- Text "reach" -->
  <text x="256" y="410" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="4">reach</text>
</svg>
