<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace">
  <defs>
    <linearGradient id="ssh-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="reach-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a1a"/>
      <stop offset="100%" stop-color="#0d3320"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">SSH vs Reach</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#8B949E">Why AI agents need a purpose-built protocol</text>

  <!-- Column headers -->
  <rect x="200" y="72" width="260" height="32" rx="6" fill="#da3633" opacity="0.15"/>
  <text x="330" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#f85149">SSH</text>

  <rect x="480" y="72" width="280" height="32" rx="6" fill="#00ADD8" opacity="0.15"/>
  <text x="620" y="93" text-anchor="middle" font-size="14" font-weight="700" fill="#00ADD8">Reach</text>

  <!-- Row template: label | ssh | reach -->
  <!-- Row 1: Connection -->
  <rect x="20" y="114" width="760" height="46" rx="4" fill="#161B22"/>
  <text x="36" y="137" font-size="11" font-weight="600" fill="#C9D1D9">Connection</text>
  <text x="36" y="152" font-size="10" fill="#8B949E">连接模型</text>

  <text x="210" y="137" font-size="11" fill="#f85149">Persistent TCP</text>
  <text x="210" y="152" font-size="10" fill="#8B949E">WiFi change / sleep / NAT → drop</text>

  <text x="490" y="137" font-size="11" fill="#00ADD8">Stateless HTTP</text>
  <text x="490" y="152" font-size="10" fill="#8B949E">Each call independent, zero disconnects</text>

  <!-- Row 2: Output -->
  <rect x="20" y="168" width="760" height="46" rx="4" fill="#0D1117"/>
  <text x="36" y="191" font-size="11" font-weight="600" fill="#C9D1D9">Output</text>
  <text x="36" y="206" font-size="10" fill="#8B949E">输出格式</text>

  <text x="210" y="191" font-size="11" fill="#f85149">Human text</text>
  <text x="210" y="206" font-size="10" fill="#8B949E">free -m → table → regex to parse</text>

  <text x="490" y="191" font-size="11" fill="#00ADD8">Structured JSON</text>
  <text x="490" y="206" font-size="10" fill="#8B949E">.memory.usage_percent → done</text>

  <!-- Row 3: Safety -->
  <rect x="20" y="222" width="760" height="46" rx="4" fill="#161B22"/>
  <text x="36" y="245" font-size="11" font-weight="600" fill="#C9D1D9">Safety</text>
  <text x="36" y="260" font-size="10" fill="#8B949E">安全预检</text>

  <text x="210" y="245" font-size="11" fill="#f85149">Fire and forget</text>
  <text x="210" y="260" font-size="10" fill="#8B949E">Command sent = command executed</text>

  <text x="490" y="245" font-size="11" fill="#00ADD8">Dry-run first</text>
  <text x="490" y="260" font-size="10" fill="#8B949E">Risk score 0-100 before execution</text>

  <!-- Row 4: Auth -->
  <rect x="20" y="276" width="760" height="46" rx="4" fill="#0D1117"/>
  <text x="36" y="299" font-size="11" font-weight="600" fill="#C9D1D9">Auth</text>
  <text x="36" y="314" font-size="10" fill="#8B949E">认证方式</text>

  <text x="210" y="299" font-size="11" fill="#f85149">Key pairs</text>
  <text x="210" y="314" font-size="10" fill="#8B949E">Generate, distribute, rotate, revoke</text>

  <text x="490" y="299" font-size="11" fill="#00ADD8">One token</text>
  <text x="490" y="314" font-size="10" fill="#8B949E">Generated at init, done</text>

  <!-- Row 5: Shell escaping -->
  <rect x="20" y="330" width="760" height="46" rx="4" fill="#161B22"/>
  <text x="36" y="353" font-size="11" font-weight="600" fill="#C9D1D9">Escaping</text>
  <text x="36" y="368" font-size="10" fill="#8B949E">转义处理</text>

  <text x="210" y="353" font-size="11" fill="#f85149">Nested quoting hell</text>
  <text x="210" y="368" font-size="10" fill="#8B949E">ssh host "echo 'it'\''s'"</text>

  <text x="490" y="353" font-size="11" fill="#00ADD8">JSON body</text>
  <text x="490" y="368" font-size="10" fill="#8B949E">No escaping issues, ever</text>

  <!-- Row 6: File writes -->
  <rect x="20" y="384" width="760" height="46" rx="4" fill="#0D1117"/>
  <text x="36" y="407" font-size="11" font-weight="600" fill="#C9D1D9">File writes</text>
  <text x="36" y="422" font-size="10" fill="#8B949E">文件写入</text>

  <text x="210" y="407" font-size="11" fill="#f85149">echo > file</text>
  <text x="210" y="422" font-size="10" fill="#8B949E">Partial writes on failure</text>

  <text x="490" y="407" font-size="11" fill="#00ADD8">Atomic write</text>
  <text x="490" y="422" font-size="10" fill="#8B949E">temp → fsync → rename, never half-written</text>

  <!-- Row 7: Errors -->
  <rect x="20" y="438" width="760" height="46" rx="4" fill="#161B22"/>
  <text x="36" y="461" font-size="11" font-weight="600" fill="#C9D1D9">Errors</text>
  <text x="36" y="476" font-size="10" fill="#8B949E">错误处理</text>

  <text x="210" y="461" font-size="11" fill="#f85149">Exit code only</text>
  <text x="210" y="476" font-size="10" fill="#8B949E">0 or 1, figure out the rest yourself</text>

  <text x="490" y="461" font-size="11" fill="#00ADD8">JSON error + context</text>
  <text x="490" y="476" font-size="10" fill="#8B949E">Reason, affected path, suggestion</text>

  <!-- Divider line -->
  <line x1="470" y1="114" x2="470" y2="484" stroke="#30363D" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" font-size="11" fill="#58A6FF">github.com/agent-0x/reach</text>
</svg>
